<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSRF Assessment Tool (Stable)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-6">MSRF Interactive Assessment Dashboard</h1>
        
        <div class="flex gap-4 mb-8 bg-gray-50 p-4 rounded border">
            <input type="file" id="fileData" class="text-sm border p-2 bg-white w-full">
            <input type="file" id="filePick" class="text-sm border p-2 bg-white w-full">
            <button onclick="initializeTool()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 whitespace-nowrap">Load Files</button>
        </div>

        <div id="dashboard" class="hidden">
            <div class="flex justify-between items-center mb-6 bg-gray-100 p-4 rounded">
                <input type="text" id="search" onkeyup="render()" placeholder="Filter services..." class="border p-2 rounded w-1/3">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Export CSV</button>
                    <label class="bg-purple-600 text-white px-4 py-2 rounded cursor-pointer hover:bg-purple-700">
                        Import CSV
                        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                    </label>
                    <button onclick="resetData()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Clear All</button>
                </div>
            </div>
            <div id="listContainer" class="space-y-6"></div>
        </div>
    </div>

    <script>
        let services = [];
        let picklists = {
            "Is Service Provided?": ["ACTIVE", "NOT PROVIDED", "DIVESTED", "FUTURE / GAP"],
            "Delivery Method": ["Counter / In-Person", "Field / Mobile", "Facility-Based", "Phone / Email", "Digital / Self-Serve", "Indirect / Internal"],
            "Delivery Provider": ["In-House Staff", "Contracted Service", "Partnership / Joint Venture", "Volunteer-Led"],
            "Relevance": ["High - Mandated", "Medium - Community Expectation", "Low - Optional"],
            "Effectiveness": ["High - Industry Standard", "Medium - Improving", "Low - Needs Review"],
            "Efficiency & Resourcing": ["High - Scalable", "Medium - Sustainable", "Low - Resource Intensive"],
            "Gap Cateogry": ["Capacity (Staffing)", "Asset / Equipment", "Financial (Budget)", "Process / Policy", "Skill / Training", "Technology", "External Factor"],
            "Strategic Direction": ["Maintain (Status Quo)", "Monitor", "Invest (Resource)", "Transform (Efficiency)", "Reduce / Divest"]
        };

        async function initializeTool() {
            const dataFile = document.getElementById('fileData').files[0];
            if(!dataFile) return alert("Please select a Data File.");
            const dText = await dataFile.text();
            const dRows = dText.split('\n').filter(r => r.trim());
            const headers = dRows[0].split(',').map(h => h.trim());
            services = dRows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let obj = {};
                headers.forEach((h, i) => obj[h] = cols[i]?.replace(/^"|"$/g, ''));
                return obj;
            });
            document.getElementById('dashboard').classList.remove('hidden');
            render();
        }

        function render() {
            const container = document.getElementById('listContainer');
            const term = document.getElementById('search').value.toLowerCase();
            const saved = JSON.parse(localStorage.getItem('msrf_data') || '{}');
            container.innerHTML = services.filter(s => s.Service_Name?.toLowerCase().includes(term)).map(s => `
                <div class="bg-white p-6 rounded shadow border-l-4 border-blue-500">
                    <h3 class="font-bold text-lg">${s.Service_Name}</h3>
                    <p class="text-sm text-gray-500 mb-4">${s.Program_Area || ''} > ${s.Service_Area || ''}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${Object.keys(picklists).map(p => `
                            <div>
                                <label class="text-[10px] font-bold uppercase text-gray-500">${p}</label>
                                <select onchange="save('${s.Service_ID}', '${p}', this.value)" class="w-full border p-1.5 rounded text-sm bg-gray-50">
                                    <option value="">--</option>
                                    ${picklists[p].map(o => `<option value="${o}" ${saved[s.Service_ID]?.[p] == o ? 'selected' : ''}>${o}</option>`).join('')}
                                </select>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function save(id, field, val) {
            let data = JSON.parse(localStorage.getItem('msrf_data') || '{}');
            if(!data[id]) data[id] = {};
            data[id][field] = val;
            localStorage.setItem('msrf_data', JSON.stringify(data));
        }

        function resetData() {
            if(confirm("Are you sure you want to clear all assessment data? This cannot be undone.")) {
                localStorage.removeItem('msrf_data');
                location.reload();
            }
        }

        function exportData() {
            const saved = JSON.parse(localStorage.getItem('msrf_data') || '{}');
            let csv = "Service_ID,Field,Value\n";
            for(let id in saved) {
                for(let field in saved[id]) csv += `${id},${field},"${saved[id][field]}"\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'MSRF_Assessment_Export.csv'; a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const rows = e.target.result.split('\n').slice(1);
                let data = {};
                rows.forEach(row => {
                    const [id, field, val] = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(id) {
                        if(!data[id]) data[id] = {};
                        data[id][field] = val?.replace(/^"|"$/g, '').trim();
                    }
                });
                localStorage.setItem('msrf_data', JSON.stringify(data));
                render();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
