    {v:"Capacity (Staffing)",d:"We do not have enough hours or bodies."},
    {v:"Asset / Equipment",d:"The tools, vehicles, or buildings are broken or missing."},
    {v:"Financial (Budget)",d:"We have the staff and assets but no operating dollars for materials or supplies."},
    {v:"Process / Policy",d:"We are blocked by bureaucracy, red tape, or bad bylaws."},
    {v:"Skill / Training",d:"We have the people but they do not know how to do it."},
    {v:"Technology",d:"We are inefficient because we lack software or digital tools."},
    {v:"External Factor",d:"The problem is caused by the Province, a partner, or weather (out of our control)."},
  ],
  strategicDirection:[
    {v:"Maintain (Status Quo)",d:"Service is healthy. Keep doing what we are doing."},
    {v:"Monitor",d:"Service is Yellow but stable. No money needed yet, just watch it."},
    {v:"Invest (Resource)",d:"We need to add money, staff, or assets to fix a gap."},
    {v:"Transform (Efficiency)",d:"We need to change how we deliver it (e.g. Go Digital, Shared Service) before we add money."},
    {v:"Reduce / Divest",d:"We should stop doing this or lower the service level."},
    {v:"Review Required",d:"Complex problem. Needs a dedicated study (e.g. Master Plan)."},
  ],
};

const EMPTY = {isProvided:"",subName:"",deliverables:"",deliveryMethod:"",deliveryProvider:"",relevance:"",effectiveness:"",efficiency:"",gapCategory:"",gapDetails:"",strategicDirection:"",stratNotes:""};

/* ---- Tiny components ---- */
function FSelect({opts, val, onChange, disabled}) {
  return (
    <select value={val} onChange={e => onChange(e.target.value)} disabled={disabled} style={{fontFamily:"inherit",fontSize:12,padding:"7px 10px",border:"1px solid rgba(13,27,46,.15)",borderRadius:5,color:"#0d1b2e",background:disabled?"#f2f5f9":"#fff",outline:"none",width:"100%",cursor:disabled?"not-allowed":"pointer"}}>
      <option value="">— Select —</option>
      {opts.map(o => <option key={o.v} value={o.v}>{o.v}</option>)}
    </select>
  );
}

function DefBox({opts, val}) {
  const opt = opts.find(o => o.v === val);
  if (!opt || !opt.d) return null;
  return <div style={{fontSize:11,color:"#7a99b8",background:"#f2f5f9",border:"1px solid rgba(13,27,46,.08)",borderRadius:5,padding:"6px 9px",marginTop:4,lineHeight:1.5}}>{opt.d}</div>;
}

function Pills({opts, val, onChange, disabled}) {
  const colorMap = {
    green: {bg:"rgba(29,158,117,.14)",br:"#1d9e75",tx:"#0f6b50"},
    yellow:{bg:"rgba(240,165,0,.14)",br:"#f0a500",tx:"#8a5e00"},
    red:   {bg:"rgba(232,84,84,.14)",br:"#e85454",tx:"#b03030"},
  };
  return (
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {opts.map(o => {
        const selected = val === o.v;
        const cm = colorMap[o.c] || null;
        const style = selected && cm
          ? {padding:"5px 12px",borderRadius:20,border:`1.5px solid ${cm.br}`,background:cm.bg,color:cm.tx,fontFamily:"inherit",fontSize:11,cursor:"pointer",fontWeight:500}
          : {padding:"5px 12px",borderRadius:20,border:"1.5px solid rgba(13,27,46,.15)",background:"transparent",color:"#7a99b8",fontFamily:"inherit",fontSize:11,cursor:"pointer"};
        return (
          <button key={o.v} style={style} onClick={() => !disabled && onChange(o.v)} disabled={disabled}>
            {o.v}
          </button>
        );
      })}
    </div>
  );
}

function RagBadge({val}) {
  if (!val) return <span style={{color:"#7a99b8"}}>—</span>;
  const u = val.toUpperCase();
  let bg="#d8e6f0",tx="#7a99b8";
  if (u.includes("GREEN")||u.includes("HIGH")||u.includes("CORE")) { bg="rgba(29,158,117,.12)"; tx="#0f6b50"; }
  else if (u.includes("YELLOW")||u.includes("MEDIUM")) { bg="rgba(240,165,0,.12)"; tx="#8a5e00"; }
  else if (u.includes("RED")||u.includes("LOW")) { bg="rgba(232,84,84,.12)"; tx="#b03030"; }
  return <span style={{display:"inline-block",padding:"1px 7px",borderRadius:10,fontSize:10,background:bg,color:tx}}>{val}</span>;
}

/* ---- Main app ---- */
function App() {
  const [assessments, setAssessments] = useState({});
  const [curId, setCurId]   = useState(null);
  const [tab, setTab]       = useState("form");
  const [paFilter, setPAF]  = useState("all");
  const [search, setSearch] = useState("");
  const [form, setForm]     = useState({...EMPTY});
  const [savedMsg, setSaved]= useState(false);

  const pas = useMemo(() => [...new Set(SERVICES.map(s => s.pa))].sort(), []);

  const filtered = useMemo(() => SERVICES.filter(s => {
    const mPA = paFilter === "all" || s.pa === paFilter;
    const mS  = !search || (s.sn+s.sa+s.pa+s.id).toLowerCase().includes(search.toLowerCase());
    return mPA && mS;
  }), [paFilter, search]);

  const grouped = useMemo(() => {
    const g={}, order=[];
    filtered.forEach(s => { if (!g[s.pa]) { g[s.pa]=[]; order.push(s.pa); } g[s.pa].push(s); });
    return {g, order};
  }, [filtered]);

  const allVals   = Object.values(assessments);
  const done      = allVals.filter(a => a.isProvided).length;
  const pct       = Math.round(done / SERVICES.length * 100);
  const activeList= allVals.filter(a => a.isProvided === "ACTIVE");
  const nNot      = allVals.filter(a => a.isProvided === "NOT PROVIDED").length;
  const nDiv      = allVals.filter(a => a.isProvided === "DIVESTED").length;
  const nFut      = allVals.filter(a => a.isProvided === "FUTURE / GAP").length;
  const nRed      = allVals.filter(a => a.effectiveness && a.effectiveness.includes("RED")).length;
  const nYel      = allVals.filter(a => a.effectiveness && a.effectiveness.includes("YELLOW")).length;

  const selectSvc = useCallback(id => {
    setCurId(id);
    setTab("form");
    setSaved(false);
    setForm(prev => {
      const existing = assessments[id];
      return existing ? {...EMPTY, ...existing} : {...EMPTY};
    });
  }, [assessments]);

  // When assessments changes and curId is set, keep form in sync only on initial load
  const ff = k => v => setForm(prev => ({...prev, [k]: v}));

  const saveForm = () => {
    if (!curId) return;
    const svc = SERVICES.find(s => s.id === curId);
    const rec = {
      ...form,
      serviceId:curId, programArea:svc.pa, serviceArea:svc.sa,
      serviceName:svc.sn, serviceType:svc.type,
      savedAt: new Date().toISOString()
    };
    setAssessments(prev => {
      const next = {...prev, [curId]: rec};
      return next;
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const nextSvc = () => {
    const idx = SERVICES.findIndex(s => s.id === curId);
    if (idx < SERVICES.length - 1) selectSvc(SERVICES[idx+1].id);
  };

  const exportCSV = () => {
    const h = ["Service_ID","Program_Area","Service_Area","Service_Name","Service_Type","Is_Service_Provided","Sub_Name","Deliverables","Delivery_Method","Delivery_Provider","Relevance","Effectiveness","Efficiency","Gap_Category","GAP_Details","Strategic_Direction","Strategic_Notes","Saved_At"];
    const rows = [h.join(",")];
    SERVICES.forEach(svc => {
      const a = assessments[svc.id] || {};
      const cells = [svc.id,svc.pa,svc.sa,svc.sn,svc.type,
        a.isProvided||"",a.subName||"",a.deliverables||"",
        a.deliveryMethod||"",a.deliveryProvider||"",
        a.relevance||"",a.effectiveness||"",a.efficiency||"",
        a.gapCategory||"",a.gapDetails||"",
        a.strategicDirection||"",a.stratNotes||"",a.savedAt||""];
      rows.push(cells.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","));
    });
    const blob = new Blob([rows.join("\r\n")], {type:"text/csv;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `MSRF_Assessment_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const resetAll = () => {
    if (window.confirm("Reset ALL assessment data? This cannot be undone.")) {
      setAssessments({}); setCurId(null); setForm({...EMPTY}); setTab("form");
    }
  };

  const curSvc = SERVICES.find(s => s.id === curId);
  const locked = !!(form.isProvided && form.isProvided !== "ACTIVE");

  /* ---- Styles (inline for portability) ---- */
  const C = {
    app:    {display:"flex",flexDirection:"column",height:"100vh"},
    topbar: {background:"#0d1b2e",borderBottom:"2px solid #c9a84c",padding:"0 20px",height:56,display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"},
    bmark:  {width:32,height:32,background:"linear-gradient(135deg,#c9a84c,#e8c96a)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:"#0d1b2e",flexShrink:0},
    body:   {display:"flex",flex:1,overflow:"hidden"},
    sidebar:{width:280,background:"#fff",borderRight:"1px solid rgba(13,27,46,.1)",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0},
    svcList:{overflowY:"auto",flex:1},
    main:   {flex:1,overflowY:"auto",padding:24},
  };

  return (
    <div style={C.app}>
      {/* ── Topbar ── */}
      <div style={C.topbar}>
        <div style={C.bmark}>M</div>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:500,color:"#f0ede8",lineHeight:1.1}}>MSRF Service Assessment</div>
          <div style={{fontSize:10,color:"#8faec8",letterSpacing:"0.06em",textTransform:"uppercase"}}>Municipal Service Review Framework</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          <span style={{fontSize:11,color:"#8faec8"}}>{done} / {SERVICES.length}</span>
          <div style={{width:100,height:4,background:"rgba(255,255,255,.12)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:"#c9a84c",borderRadius:2,width:`${pct}%`,transition:"width .3s"}}/>
          </div>
        </div>
        <button onClick={() => { setCurId(null); setTab("summary"); }} style={{padding:"5px 12px",fontFamily:"inherit",fontSize:11,borderRadius:5,border:"1px solid rgba(255,255,255,.2)",background:"transparent",color:"rgba(255,255,255,.7)",cursor:"pointer"}}>&#128202; Summary</button>
        <button onClick={exportCSV} style={{padding:"5px 12px",fontFamily:"inherit",fontSize:11,borderRadius:5,border:"1px solid #c9a84c",background:"#c9a84c",color:"#0d1b2e",cursor:"pointer",fontWeight:500}}>&darr; Export CSV</button>
        <button onClick={resetAll} style={{padding:"4px 10px",fontFamily:"inherit",fontSize:10,borderRadius:5,border:"1px solid rgba(232,84,84,.4)",background:"transparent",color:"rgba(232,84,84,.8)",cursor:"pointer"}}>Reset</button>
      </div>

      <div style={C.body}>
        {/* ── Sidebar ── */}
        <div style={C.sidebar}>
          <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(13,27,46,.08)",flexShrink:0}}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search services…"
              style={{width:"100%",padding:"7px 10px",fontFamily:"inherit",fontSize:12,border:"1px solid rgba(13,27,46,.15)",borderRadius:5,outline:"none",background:"#f2f5f9",color:"#0d1b2e",boxSizing:"border-box"}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>
              {["all",...pas].map(pa => {
                const on = paFilter === pa;
                return <button key={pa} onClick={() => setPAF(pa)} title={pa} style={{padding:"3px 8px",fontSize:10,borderRadius:20,border:"1px solid rgba(13,27,46,.15)",background:on?"#0d1b2e":"transparent",color:on?"#fff":"#7a99b8",cursor:"pointer",fontFamily:"inherit"}}>
                  {pa === "all" ? "All" : (PA_ABBR[pa] || pa.slice(0,3))}
                </button>;
              })}
            </div>
          </div>
          <div style={{padding:"7px 14px",borderBottom:"1px solid rgba(13,27,46,.08)",display:"flex",gap:10,fontSize:11,color:"#7a99b8",flexShrink:0,flexWrap:"wrap"}}>
            <span>&#x1F7E2; {activeList.length} Active</span>
            <span>&#x26AA; {nNot+nDiv} Not Provided</span>
            <span>&#x1F7E1; {nFut} Future</span>
          </div>
          <div style={C.svcList}>
            {grouped.order.map(pa => (
              <div key={pa}>
                <div style={{padding:"7px 14px 4px",fontSize:10,textTransform:"uppercase",letterSpacing:"0.07em",color:"#7a99b8",background:"#f2f5f9",borderBottom:"1px solid rgba(13,27,46,.07)",borderLeft:`3px solid ${PA_COLORS[pa]||"#888"}`}}>{pa}</div>
                {grouped.g[pa].map(svc => {
                  const a  = assessments[svc.id];
                  const st = a?.isProvided || "";
                  const dotBg = st==="ACTIVE"?"#1d9e75":st==="NOT PROVIDED"?"#fff":st==="DIVESTED"?"#888":st==="FUTURE / GAP"?"#f0a500":"#d8e6f0";
                  const dotBr = st==="NOT PROVIDED"?"#888":dotBg;
                  const active = curId === svc.id;
                  return (
                    <div key={svc.id} onClick={() => selectSvc(svc.id)}

                      <div style={{width:8,height:8,borderRadius:"50%",background:dotBg,border:`1.5px solid ${dotBr}`,flexShrink:0}} title={st||"Not assessed"}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:active?"#4a6fa5":"#0d1b2e",fontWeight:active?500:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{svc.sn}</div>

                        <span key={i} style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:b.c?b.c+"22":"#f2f5f9",color:b.c||"#7a99b8",border:`1px solid ${b.c?b.c+"44":"rgba(13,27,46,.12)"}`}}>{b.l}</span>

                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          <label style={{fontSize:11,color:"#3a567a",fontWeight:500}}>Strategic Notes</label>
                          <input value={form.stratNotes} onChange={e=>ff("stratNotes")(e.target.value)} disabled={locked} placeholder="Council direction, flags, notes…" style={{fontFamily:"inherit",fontSize:12,padding:"7px 10px",border:"1px solid rgba(13,27,46,.15)",borderRadius:5,color:"#0d1b2e",background:locked?"#f2f5f9":"#fff",outline:"none",width:"100%",boxSizing:"border-box"}}/>
                        </div>
                      </div>
                    )},
                  ].map(sec => (
                    <div key={sec.num} style={{background:"#fff",border:"1px solid rgba(13,27,46,.09)",borderRadius:8,padding:"16px 18px",marginBottom:12,boxShadow:"0 1px 4px rgba(13,27,46,.05)",opacity:locked?.35:1,pointerEvents:locked?"none":"auto"}}>
                      <div style={{fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.07em",color:"#7a99b8",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:18,height:18,borderRadius:"50%",background:"#0d1b2e",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>{sec.num}</div>
                        {sec.title}
                      </div>
                      {sec.content}
                    </div>
                  ))}

                  {/* Footer */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,paddingTop:14,borderTop:"1px solid rgba(13,27,46,.08)",flexWrap:"wrap",gap:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <button onClick={saveForm} style={{padding:"8px 20px",fontFamily:"inherit",fontSize:12,fontWeight:500,borderRadius:5,border:"none",background:"#0d1b2e",color:"#fff",cursor:"pointer"}}>
                        &#128190; Save Assessment
                      </button>
                      {savedMsg && (
                        <span style={{fontSize:11,color:"#1d9e75"}}>
                          &#10003; Saved &mdash; {Object.keys(assessments).length + 1} records total
                        </span>
                      )}
                    </div>
                    <button onClick={nextSvc} style={{padding:"7px 14px",fontFamily:"inherit",fontSize:11,borderRadius:5,border:"1px solid rgba(13,27,46,.15)",background:"transparent",color:"#3a567a",cursor:"pointer"}}>
                      Next Service &rarr;
                    </button>
                  </div>
                </div>
              )}

              {/* ── Summary ── */}
              {tab === "summary" && (
                <div style={{maxWidth:920}}>
                  <div style={{marginBottom:16}}>
                    <div style={{fontFamily:"Georgia,serif",fontSize:19,fontWeight:500,marginBottom:4}}>Assessment Summary</div>
                    <div style={{fontSize:12,color:"#7a99b8"}}>{done} of {SERVICES.length} services assessed &middot; {pct}% complete</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:18}}>
                    {[
                      [SERVICES.length,"Total Services","#0d1b2e"],
                      [activeList.length,"Active","#1d9e75"],
                      [nNot,"Not Provided","#7a99b8"],
                      [nDiv,"Divested","#888"],
                      [nFut,"Future / Gap","#f0a500"],
                      [nRed,"RED Services","#e85454"],
                      [nYel,"YELLOW Services","#f0a500"],
                    ].map(([n,l,c]) => (
                      <div key={l} style={{background:"#fff",border:"1px solid rgba(13,27,46,.09)",borderRadius:8,padding:"12px 14px",textAlign:"center",boxShadow:"0 1px 4px rgba(13,27,46,.05)"}}>
                        <div style={{fontFamily:"Georgia,serif",fontSize:24,fontWeight:500,color:c,lineHeight:1}}>{n}</div>
                        <div style={{fontSize:10,color:"#7a99b8",letterSpacing:"0.05em",textTransform:"uppercase",marginTop:3}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  {activeList.length > 0 ? (
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(13,27,46,.06)"}}>
                        <thead>
                          <tr>{["ID","Service Name","Program Area","Relevance","Effectiveness","Efficiency","Strategic Direction"].map(h => (
                            <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",color:"#7a99b8",background:"#f2f5f9",borderBottom:"1px solid rgba(13,27,46,.08)",whiteSpace:"nowrap"}}>{h}</th>
                          ))}</tr>
                        </thead>
                        <tbody>
                          {activeList.map((a,i) => (
                            <tr key={a.serviceId} onClick={() => selectSvc(a.serviceId)} style={{cursor:"pointer",borderBottom:"1px solid rgba(13,27,46,.06)",background:"#fff"}}>
                              <td style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"#0d1b2e"}}>{a.serviceId}</td>
                              <td style={{padding:"8px 12px",fontSize:11,color:"#3a567a",maxWidth:180}}>{a.serviceName}</td>
                              <td style={{padding:"8px 12px",fontSize:10,color:"#7a99b8"}}>{(a.programArea||"").replace(" & Administrative Leadership","").replace(" & Environmental Services","")}</td>
                              <td style={{padding:"8px 12px"}}><RagBadge val={a.relevance}/></td>
                              <td style={{padding:"8px 12px"}}><RagBadge val={a.effectiveness}/></td>
                              <td style={{padding:"8px 12px"}}><RagBadge val={a.efficiency}/></td>
                              <td style={{padding:"8px 12px",fontSize:11,color:"#3a567a"}}>{a.strategicDirection||"—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <div style={{padding:36,textAlign:"center",color:"#7a99b8",background:"#fff",borderRadius:8,border:"1px solid rgba(13,27,46,.09)"}}>
                      No active services assessed yet. Select services from the sidebar and save them to see results here.
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
